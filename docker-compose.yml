services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=WPecKMQ6x/qcOjLhZvBHQf5UHffxR+qZKPPVup0uQlo=
      - WIREGUARD_ADDRESSES=10.2.0.2/32
      - UPDATER_PERIOD=24h
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_STATUS_FILE=/gluetun/forwarded_port.txt
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - HTTP_CONTROL_SERVER_LOG=on
    volumes:
      - /volume2/docker/gluetun:/gluetun
    ports:
      - 8000:8000
      - 8080:8080 # WebUI qBittorrent
      - 40443:6881/tcp # Datos qBittorrent (TCP)
      - 40443:6881/udp # Datos qBittorrent (UDP)
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
    restart: always

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8080
    volumes:
      - /volume2/docker/qbittorrent/config:/config
      - /volume1/Media:/data
    depends_on:
      - gluetun
    restart: always

  # ── Port sync ──────────────────────────────────────────────────────────────
  # Watches /gluetun/forwarded_port.txt and updates qBittorrent's listen port.
  # Shares gluetun's network namespace so it can reach qBittorrent on localhost.
  port-sync:
    image: ghcr.io/YOUR_USER/gluetun-qbit-port-sync:latest  # <-- replace YOUR_USER
    container_name: port-sync
    network_mode: "container:gluetun"
    environment:
      - QBIT_HOST=http://localhost:8080
      - QBIT_USER=admin
      - QBIT_PASS=adminadmin        # <-- change to your qBittorrent password
      - CHECK_INTERVAL=30
      - LOG_LEVEL=INFO
    volumes:
      - /volume2/docker/gluetun:/gluetun:ro   # read-only is enough
    depends_on:
      - gluetun
      - qbittorrent
    restart: always
  # ──────────────────────────────────────────────────────────────────────────

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - 8192:8192/tcp
      - 8191:8191/tcp
    volumes: 
      - /volume2/docker/flaresolverr/config:/config

  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - 9696:9696/tcp
    volumes:
      - /volume2/docker/prowlarr/config:/config

  bazarr:
    image: linuxserver/bazarr:latest
    container_name: bazarr
    volumes:
      - /volume2/docker/bazarr/config:/config
      - /volume1/Media:/data
    ports:
      - 6767:6767/tcp

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - /volume2/docker/radarr/config:/config
      - /volume1/Media:/data
    environment:
      - PUID=1000
      - PGID=100
    ports:
      - 7878:7878/tcp

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - /volume2/docker/sonarr/config:/config
      - /volume1/Media:/data
    environment:
      - PUID=1000
      - PGID=100
    ports:
      - 8989:8989/tcp
